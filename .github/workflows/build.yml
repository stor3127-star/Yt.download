name: Build
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build with Buildozer
      uses: jackkyle/buildozer-action@v1
      with:
        command: buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
        
